name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can — the more context, the faster we can fix it.

  - type: input
    id: version
    attributes:
      label: nanosync version
      placeholder: "e.g. v0.0.4  (run: nanosync --version)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Docker
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `nanosync stream --source ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages or log output here.
      render: shell

  - type: input
    id: source
    attributes:
      label: Source database
      placeholder: "e.g. PostgreSQL 15 on AWS RDS"

  - type: input
    id: sink
    attributes:
      label: Sink (if applicable)
      placeholder: "e.g. BigQuery, Kafka, stdout"

  - type: textarea
    id: config
    attributes:
      label: Config (sanitised)
      description: Paste your nanosync.yaml with secrets removed.
      render: yaml
